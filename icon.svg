<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#144d32" />
      <stop offset="100%" stop-color="#072215" />
    </radialGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e0aa" />
      <stop offset="30%" stop-color="#d4af37" />
      <stop offset="70%" stop-color="#aa8010" />
      <stop offset="100%" stop-color="#f3e0aa" />
    </linearGradient>

    <!-- Gold Glow Filter -->
    <filter id="goldGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Islamic Pattern Overlay (Rub el Hizb) -->
  <g transform="translate(256, 256) scale(0.9)" opacity="0.15">
    <rect x="-180" y="-180" width="360" height="360" fill="none" stroke="#d4af37" stroke-width="4" />
    <rect x="-180" y="-180" width="360" height="360" fill="none" stroke="#d4af37" stroke-width="4" transform="rotate(45)" />
    <circle r="180" fill="none" stroke="#d4af37" stroke-width="2" />
  </g>

  <!-- Golden Outer Ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#goldGrad)" stroke-width="8" filter="url(#goldGlow)" />
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6" />

  <!-- Arabic Calligraphy "Allah" -->
  <text x="256" y="295" font-family="'Amiri', 'Scheherazade New', 'Traditional Arabic', 'DecoType Naskh', 'Arial', sans-serif" font-size="150" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" filter="url(#goldGlow)">الله</text>

  <!-- Small text below "99 Imena" -->
  <text x="256" y="380" font-family="'Outfit', 'Inter', 'Montserrat', sans-serif" font-size="24" font-weight="600" fill="#f3e0aa" letter-spacing="4" text-anchor="middle" opacity="0.9">99 IMENA</text>
</svg>
